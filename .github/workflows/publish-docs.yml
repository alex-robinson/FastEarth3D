name: Publish docs

# Build the Quarto site and publish it to the gh-pages branch.
# Only runs when something under docs/ (or this workflow) changes — pushes to
# main that do not touch the docs are ignored.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping publishes racing on the gh-pages branch.
concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
